<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI Room</title>
</head>
<body style="background:#0f172a;color:white;font-family:Arial;padding:20px">
<h2>AI Room (You + 2 AIs)</h2>
<input id="input" placeholder="Say something..." style="width:70%;padding:10px">
<button onclick="send()">Send</button>
<div id="chat" style="margin-top:20px"></div>
<script>
const API_KEY = "YOUR_OPENAI_KEY";
let memoryAlpha = [], memoryClaude = [];
const alphaSystem = "You are Alpha. Logical, strategic.";
const claudeSystem = "You are Claude-style AI. Human-like and thoughtful.";
function addMessage(s,t){document.getElementById("chat").innerHTML+=`<p><b>${s}:</b> ${t}</p>`;}
async function callAI(system,memory,input){
  const res=await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{Authorization:"Bearer "+API_KEY,"Content-Type":"application/json"},
    body:JSON.stringify({model:"gpt-5",messages:[{role:"system",content:system},...memory,{role:"user",content:input}]})
  });
  const data=await res.json();
  const reply=data.choices[0].message.content;
  memory.push({role:"user",content:input},{role:"assistant",content:reply});
  return reply;
}
async function send(){
  const input=document.getElementById("input").value;
  if(!input) return;
  addMessage("You",input);
  const [a,b]=await Promise.all([
    callAI(alphaSystem,memoryAlpha,input),
    callAI(claudeSystem,memoryClaude,input)
  ]);
  addMessage("Alpha",a);
  addMessage("Claude",b);
  memoryAlpha.push({role:"assistant",content:b});
  memoryClaude.push({role:"assistant",content:a});
  document.getElementById("input").value="";
}
</script>
</body>
</html>
